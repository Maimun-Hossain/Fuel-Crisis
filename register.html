<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Fuel Crisis Management System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-[#020617] min-h-screen flex flex-col items-center justify-center p-4">
    <div class="glass-card p-10 w-full max-w-md animate-fade-in neon-border">
        <h1 class="text-4xl font-extrabold mb-2 text-center gradient-text">Create Account</h1>
        <p class="text-slate-400 text-center mb-8 font-medium">Join the Fuel Crisis Management System</p>
        
        <form id="registerForm" class="space-y-6">
            <div>
                <label class="block text-sm font-semibold text-slate-400 mb-1.5">Full Name</label>
                <input type="text" id="regName" required class="w-full input-dark p-3" placeholder="John Doe">
            </div>
            <div>
                <label class="block text-sm font-semibold text-slate-400 mb-1.5">Email Address</label>
                <input type="email" id="regEmail" required class="w-full input-dark p-3" placeholder="john@example.com">
            </div>
            <div>
                <label class="block text-sm font-semibold text-slate-400 mb-1.5">Password</label>
                <input type="password" id="regPassword" required class="w-full input-dark p-3" placeholder="••••••••">
            </div>
            <div>
                <label class="block text-sm font-semibold text-slate-400 mb-1.5">User Role</label>
                <select id="regRole" class="w-full input-dark p-3 cursor-pointer">
                    <option value="user">Regular User</option>
                    <option value="staff">Station Staff</option>
                    <option value="admin">System Admin</option>
                </select>
            </div>
            <button type="submit" class="w-full btn-glow p-3.5 mt-4 text-lg">Register Now</button>
        </form>
        
        <p class="mt-8 text-center text-slate-400">
            Already have an account? <a href="index.html" class="text-indigo-400 hover:underline font-bold">Sign In</a>
        </p>
    </div>

    <script src="script.js"></script>
    <script>
        document.getElementById('registerForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const name = document.getElementById('regName').value;
            const email = document.getElementById('regEmail').value;
            const password = document.getElementById('regPassword').value;
            const role = document.getElementById('regRole').value;

            if (registerUser(name, email, password, role)) {
                alert('Registration successful! Please login.');
                window.location.href = 'index.html';
            }
        });
    </script>
</body>
</html>
