<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Analytics - Fuel Crisis Management System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-gray-100 min-h-screen">
    <nav id="navbar" class="bg-blue-600 text-white shadow-lg"></nav>

    <main class="container mx-auto px-4 py-8">
        <h1 class="text-3xl font-bold mb-6">System Analytics</h1>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-8">
            <div class="bg-white p-6 rounded-lg shadow-md border-b-4 border-blue-500">
                <p class="text-gray-500 text-sm uppercase font-bold">Total Stations</p>
                <p id="totalStations" class="text-3xl font-black">0</p>
            </div>
            <div class="bg-white p-6 rounded-lg shadow-md border-b-4 border-green-500">
                <p class="text-gray-500 text-sm uppercase font-bold">Active Stations</p>
                <p id="activeStations" class="text-3xl font-black">0</p>
            </div>
            <div class="bg-white p-6 rounded-lg shadow-md border-b-4 border-yellow-500">
                <p class="text-gray-500 text-sm uppercase font-bold">Total Tokens</p>
                <p id="totalTokens" class="text-3xl font-black">0</p>
            </div>
            <div class="bg-white p-6 rounded-lg shadow-md border-b-4 border-purple-500">
                <p class="text-gray-500 text-sm uppercase font-bold">Busiest Station</p>
                <p id="busiestStation" class="text-lg font-bold truncate mt-1">N/A</p>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            <div class="bg-white p-6 rounded-lg shadow-md">
                <h2 class="text-xl font-bold mb-4">Peak Hour Analysis</h2>
                <canvas id="peakHourChart"></canvas>
            </div>
            <div class="bg-white p-6 rounded-lg shadow-md">
                <h2 class="text-xl font-bold mb-4">Station Usage</h2>
                <canvas id="stationUsageChart"></canvas>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const user = Storage.getCurrentUser();
            if (user?.role !== 'admin') {
                window.location.href = 'dashboard.html';
                return;
            }

            const stations = Storage.get('stations');
            const tokens = Storage.get('tokens');

            // Summary Stats
            document.getElementById('totalStations').textContent = stations.length;
            document.getElementById('activeStations').textContent = stations.filter(s => s.availability).length;
            document.getElementById('totalTokens').textContent = tokens.length;

            const stationTokenCounts = {};
            tokens.forEach(t => {
                stationTokenCounts[t.stationId] = (stationTokenCounts[t.stationId] || 0) + 1;
            });
            const busiestId = Object.keys(stationTokenCounts).reduce((a, b) => stationTokenCounts[a] > stationTokenCounts[b] ? a : b, null);
            const busiestName = stations.find(s => s.id === busiestId)?.name || 'None';
            document.getElementById('busiestStation').textContent = busiestName;

            // Peak Hour Analysis
            const hourCounts = new Array(24).fill(0);
            tokens.forEach(t => {
                const hour = new Date(t.createdAt).getHours();
                hourCounts[hour]++;
            });

            new Chart(document.getElementById('peakHourChart'), {
                type: 'bar',
                data: {
                    labels: Array.from({length: 24}, (_, i) => `${i}:00`),
                    datasets: [{
                        label: 'Tokens Requested',
                        data: hourCounts,
                        backgroundColor: 'rgba(59, 130, 246, 0.5)',
                        borderColor: 'rgb(59, 130, 246)',
                        borderWidth: 1
                    }]
                },
                options: {
                    scales: {
                        y: { beginAtZero: true }
                    }
                }
            });

            // Station Usage
            new Chart(document.getElementById('stationUsageChart'), {
                type: 'pie',
                data: {
                    labels: stations.map(s => s.name),
                    datasets: [{
                        data: stations.map(s => stationTokenCounts[s.id] || 0),
                        backgroundColor: [
                            'rgba(255, 99, 132, 0.5)',
                            'rgba(54, 162, 235, 0.5)',
                            'rgba(255, 206, 86, 0.5)',
                            'rgba(75, 192, 192, 0.5)',
                            'rgba(153, 102, 255, 0.5)'
                        ]
                    }]
                }
            });
        });
    </script>
</body>
</html>
