<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Token Management - Fuel Crisis Management System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-[#020617] min-h-screen text-slate-200">
    <nav id="navbar" class="glass-navbar text-white shadow-lg sticky top-0 z-40"></nav>

    <main class="container mx-auto px-4 py-8">
        <h1 class="text-4xl font-black mb-10 gradient-text">Token Management</h1>

        <!-- User View: Active Token -->
        <div id="userTokenView" class="hidden">
            <div id="noTokenMessage" class="hidden glass-card p-12 text-center max-w-lg mx-auto border-dashed border-slate-700">
                <p class="text-slate-500 mb-8 font-medium">You don't have any active tokens at the moment.</p>
                <a href="stations.html" class="btn-glow px-10 py-3.5 inline-block text-lg">Request a Token</a>
            </div>
            <div id="activeTokenCard" class="hidden">
                <!-- Token details injected by JS -->
            </div>
        </div>

        <!-- Staff/Admin View: Station Queues -->
        <div id="staffQueueView" class="hidden">
            <div id="stationQueues" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                <!-- Station queues injected by JS -->
            </div>
        </div>
    </main>

    <script src="script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const user = Storage.getCurrentUser();
            if (!user) return;

            const tokens = Storage.get('tokens') || [];
            const stations = Storage.get('stations') || [];

            if (user.role === 'user') {
                document.getElementById('userTokenView').classList.remove('hidden');
                const active = tokens.find(t => t.userId === user.email && t.status === 'waiting');
                const card = document.getElementById('activeTokenCard');
                const noMsg = document.getElementById('noTokenMessage');

                if (active) {
                    const s = stations.find(x => x.id === active.stationId);
                    const pos = tokens.filter(t => t.stationId === active.stationId && t.status === 'waiting').sort((a,b) => a.tokenNumber - b.tokenNumber).findIndex(t => t.id === active.id) + 1;
                    
                    card.className = "glass-card p-12 max-w-md mx-auto text-center neon-border animate-fade-in shadow-2xl relative overflow-hidden";
                    card.innerHTML = `
                        <div class="absolute top-0 right-0 p-4 opacity-5">
                            <svg class="w-32 h-32" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M11.3 1.046A1 1 0 0112 2v5h4a1 1 0 01.82 1.573l-7 10A1 1 0 018 18v-5H4a1 1 0 01-.82-1.573l7-10a1 1 0 011.12-.38z" clip-rule="evenodd"></path></svg>
                        </div>
                        <p class="uppercase text-xs font-black text-indigo-400 tracking-[0.25em] mb-4">${s?.name || 'Unknown Station'}</p>
                        <div class="text-[120px] leading-none font-black gradient-text my-6">#${active.tokenNumber}</div>
                        <div class="bg-indigo-500/10 py-4 px-8 rounded-2xl border border-indigo-500/20 inline-block mb-8">
                            <span class="text-slate-400 font-bold uppercase text-[10px] tracking-widest block mb-1">Current Queue Position</span>
                            <span class="text-indigo-400 font-black text-3xl">${pos}</span>
                        </div>
                        <p class="text-[10px] text-slate-500 font-medium uppercase tracking-widest">Requested at: ${new Date(active.createdAt).toLocaleTimeString()}</p>
                    `;
                    card.classList.remove('hidden');
                    noMsg.classList.add('hidden');
                } else {
                    card.classList.add('hidden');
                    noMsg.classList.remove('hidden');
                }
            } else {
                document.getElementById('staffQueueView').classList.remove('hidden');
                const container = document.getElementById('stationQueues');
                container.innerHTML = stations.map((s, idx) => {
                    const queue = tokens.filter(t => t.stationId === s.id && t.status === 'waiting').sort((a,b) => a.tokenNumber - b.tokenNumber);
                    const next = queue[0];
                    return `
                        <div class="glass-card p-8 animate-fade-in flex flex-col h-full" style="animation-delay: ${idx * 0.1}s">
                            <h3 class="font-bold text-xl text-slate-200 border-b border-slate-700/50 pb-5 mb-8 flex justify-between items-center">
                                ${s.name}
                                <span class="bg-slate-800 text-[10px] px-2 py-1 rounded text-slate-500 font-black">${queue.length} IN QUEUE</span>
                            </h3>
                            <div class="flex-grow flex justify-between items-center mb-10 px-2">
                                <div class="text-center">
                                    <p class="text-[10px] text-slate-500 font-black uppercase tracking-[0.2em] mb-2">WAITING</p>
                                    <p class="text-5xl font-black text-slate-300">${queue.length}</p>
                                </div>
                                <div class="w-px h-12 bg-slate-800"></div>
                                ${next ? `
                                    <div class="text-center">
                                        <p class="text-[10px] text-indigo-400 font-black uppercase tracking-[0.2em] mb-2">NEXT UP</p>
                                        <p class="text-5xl font-black gradient-text">#${next.tokenNumber}</p>
                                    </div>
                                ` : `
                                    <div class="text-center">
                                        <p class="text-[10px] text-slate-700 font-black uppercase tracking-[0.2em] mb-2">NEXT UP</p>
                                        <p class="text-5xl font-black text-slate-800">-</p>
                                    </div>
                                `}
                            </div>
                            <button onclick="handleServe('${s.id}')" ${!next ? 'disabled' : ''} 
                                    class="w-full btn-glow py-4 text-sm disabled:opacity-20 disabled:grayscale disabled:transform-none">
                                CALL NEXT USER
                            </button>
                        </div>
                    `;
                }).join('');
            }
        });

        function handleServe(stationId) {
            const tokens = Storage.get('tokens') || [];
            const next = tokens
                .filter(t => t.stationId === stationId && t.status === 'waiting')
                .sort((a,b) => a.tokenNumber - b.tokenNumber)[0];

            if (next) {
                next.status = 'served';
                Storage.set('tokens', tokens);
                location.reload();
            }
        }
    </script>
</body>
</html>
