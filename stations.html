<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stations - Fuel Crisis Management System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-[#020617] min-h-screen text-slate-200">
    <nav id="navbar" class="glass-navbar text-white shadow-lg sticky top-0 z-40"></nav>

    <main class="container mx-auto px-4 py-8">
        <div class="flex flex-col md:flex-row justify-between items-center mb-10">
            <h1 class="text-4xl font-black gradient-text">Fuel Stations</h1>
            <div id="staffActions" class="hidden mt-4 md:mt-0">
                <button onclick="toggleAddStationModal()" class="btn-glow px-6 py-2.5">Add New Station</button>
            </div>
        </div>

        <!-- Search and Filter -->
        <div class="glass-card p-6 mb-8 flex flex-col md:flex-row gap-6 items-center">
            <div class="flex-grow w-full relative">
                <input type="text" id="searchInput" placeholder="Search stations or locations..." class="w-full input-dark p-3.5 pl-12 focus:ring-2 focus:ring-indigo-500/50">
                <div class="absolute left-4 top-4 text-slate-500">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" /></svg>
                </div>
            </div>
            <select id="filterSelect" class="input-dark p-3.5 w-full md:w-64 cursor-pointer">
                <option value="all">All Stations</option>
                <option value="available">Available Only</option>
                <option value="unavailable">Unavailable Only</option>
            </select>
        </div>

        <div id="staffPriceActions" class="hidden glass-card p-8 mb-8 border-indigo-500/20">
            <h2 class="text-xl font-bold mb-6 text-indigo-400 uppercase tracking-widest">Update Market Fuel Prices</h2>
            <form id="priceForm" class="flex flex-wrap gap-6 items-end">
                <div class="space-y-2">
                    <label class="block text-xs font-black text-slate-500 uppercase tracking-wider">Petrol (Rs)</label>
                    <input type="number" id="petrolPrice" step="0.01" class="input-dark p-3 w-32">
                </div>
                <div class="space-y-2">
                    <label class="block text-xs font-black text-slate-500 uppercase tracking-wider">Diesel (Rs)</label>
                    <input type="number" id="dieselPrice" step="0.01" class="input-dark p-3 w-32">
                </div>
                <button type="submit" class="btn-secondary-glow px-8 py-3 h-[50px]">Update Prices</button>
            </form>
        </div>

        <!-- Stations List -->
        <div id="stationsList" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            <!-- Stations will be rendered here -->
        </div>
    </main>

    <!-- Add Station Modal -->
    <div id="addStationModal" class="hidden fixed inset-0 bg-black/80 backdrop-blur-sm flex items-center justify-center z-50 p-4">
        <div class="glass-card p-8 w-full max-w-md neon-border shadow-2xl">
            <h2 class="text-3xl font-black mb-6 gradient-text">Add New Station</h2>
            <form id="addStationForm" class="space-y-5">
                <div>
                    <label class="block text-sm font-semibold text-slate-400 mb-1.5">Station Name</label>
                    <input type="text" id="stationName" required class="w-full input-dark p-3" placeholder="Shell City Center">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-slate-400 mb-1.5">Location Name</label>
                    <input type="text" id="stationLocation" required class="w-full input-dark p-3" placeholder="Downtown">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-slate-400 mb-1.5">Google Maps URL</label>
                    <input type="url" id="stationMapLink" placeholder="https://goo.gl/maps/..." required class="w-full input-dark p-3">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-slate-400 mb-1.5">Fuel Types (comma separated)</label>
                    <input type="text" id="stationFuelTypes" placeholder="petrol, diesel" required class="w-full input-dark p-3">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-slate-400 mb-1.5">Image URL (optional)</label>
                    <input type="url" id="stationImage" placeholder="https://example.com/image.jpg" class="w-full input-dark p-3">
                </div>
                <div class="flex justify-end space-x-4 pt-4">
                    <button type="button" onclick="toggleAddStationModal()" class="px-4 py-2 text-slate-400 hover:text-white font-bold">Cancel</button>
                    <button type="submit" class="btn-glow px-8 py-2.5">Save Station</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Edit Station Modal -->
    <div id="editStationModal" class="hidden fixed inset-0 bg-black/80 backdrop-blur-sm flex items-center justify-center z-50 p-4">
        <div class="glass-card p-8 w-full max-w-md neon-border shadow-2xl">
            <h2 class="text-3xl font-black mb-6 text-indigo-400">Edit Station Info</h2>
            <form id="editStationForm" class="space-y-5">
                <input type="hidden" id="editStationId">
                <div>
                    <label class="block text-sm font-semibold text-slate-400 mb-1.5">Station Name</label>
                    <input type="text" id="editName" required class="w-full input-dark p-3">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-slate-400 mb-1.5">Location Name</label>
                    <input type="text" id="editLocation" required class="w-full input-dark p-3">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-slate-400 mb-1.5">Google Maps URL</label>
                    <input type="url" id="editMapLink" required class="w-full input-dark p-3">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-slate-400 mb-1.5">Image URL</label>
                    <input type="url" id="editImage" class="w-full input-dark p-3">
                </div>
                <div class="flex justify-end space-x-4 pt-4">
                    <button type="button" onclick="toggleEditStationModal()" class="px-4 py-2 text-slate-400 hover:text-white font-bold">Cancel</button>
                    <button type="submit" class="btn-glow px-8 py-2.5">Update Info</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Log Fuel Modal -->
    <div id="logFuelModal" class="hidden fixed inset-0 bg-black/80 backdrop-blur-sm flex items-center justify-center z-50 p-4">
        <div class="glass-card p-8 w-full max-w-md neon-border shadow-2xl">
            <h2 class="text-3xl font-black mb-6 text-emerald-400">Update Fuel Liter</h2>
            <form id="logFuelForm" class="space-y-5">
                <input type="hidden" id="logStationId">
                <div>
                    <label class="block text-sm font-semibold text-slate-400 mb-1.5">Select Fuel Type</label>
                    <select id="logFuelType" required class="w-full input-dark p-3"></select>
                </div>
                <div>
                    <label class="block text-sm font-semibold text-slate-400 mb-1.5">Amount to Add (Liters)</label>
                    <input type="number" id="logAmount" required min="1" class="w-full input-dark p-3">
                </div>
                <div class="flex justify-end space-x-4 pt-4">
                    <button type="button" onclick="toggleLogFuelModal()" class="px-4 py-2 text-slate-400 hover:text-white font-bold">Cancel</button>
                    <button type="submit" class="btn-secondary-glow px-8 py-2.5 shadow-emerald-500/20">Update Stock</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Comment Modal -->
    <div id="commentModal" class="hidden fixed inset-0 bg-black/80 backdrop-blur-sm flex items-center justify-center z-50 p-4">
        <div class="glass-card p-8 w-full max-w-md neon-border shadow-2xl">
            <h2 class="text-3xl font-black mb-6 gradient-text">Review Station</h2>
            <form id="commentForm" class="space-y-6">
                <input type="hidden" id="commentStationId">
                <div>
                    <label class="block text-sm font-semibold text-slate-400 mb-3">How is the oil quality?</label>
                    <div class="flex space-x-6">
                        <label class="flex items-center space-x-3 cursor-pointer group">
                            <input type="radio" name="oilType" value="good" checked class="hidden peer">
                            <div class="w-5 h-5 rounded-full border-2 border-slate-700 peer-checked:border-emerald-500 peer-checked:bg-emerald-500 transition-all"></div>
                            <span class="text-emerald-400 font-bold group-hover:text-emerald-300 transition-colors">Good Quality</span>
                        </label>
                        <label class="flex items-center space-x-3 cursor-pointer group">
                            <input type="radio" name="oilType" value="bad" class="hidden peer">
                            <div class="w-5 h-5 rounded-full border-2 border-slate-700 peer-checked:border-rose-500 peer-checked:bg-rose-500 transition-all"></div>
                            <span class="text-rose-400 font-bold group-hover:text-rose-300 transition-colors">Bad Quality</span>
                        </label>
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-semibold text-slate-400 mb-1.5">Your Experience</label>
                    <textarea id="commentText" required class="w-full input-dark p-3 h-32 resize-none" placeholder="Share your experience..."></textarea>
                </div>
                <div class="flex justify-end space-x-4 pt-4">
                    <button type="button" onclick="toggleCommentModal()" class="px-4 py-2 text-slate-400 hover:text-white font-bold">Cancel</button>
                    <button type="submit" class="btn-glow px-8 py-2.5">Post Review</button>
                </div>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        const stationsList = document.getElementById('stationsList');
        const searchInput = document.getElementById('searchInput');
        const filterSelect = document.getElementById('filterSelect');
        const user = Storage.getCurrentUser();

        function renderStations() {
            const stations = Storage.get('stations');
            const votes = Storage.get('votes');
            const comments = Storage.get('comments');
            const query = searchInput.value.toLowerCase();
            const filter = filterSelect.value;

            const filteredStations = stations.filter(s => {
                const matchesSearch = s.name.toLowerCase().includes(query) || s.location.toLowerCase().includes(query);
                const matchesFilter = filter === 'all' || 
                                     (filter === 'available' && s.availability) || 
                                     (filter === 'unavailable' && !s.availability);
                return matchesSearch && matchesFilter;
            });

            stationsList.innerHTML = filteredStations.map((s, idx) => {
                const stationVotes = votes.filter(v => v.stationId === s.id);
                const upvotes = stationVotes.filter(v => v.vote === 'upvote').length;
                const downvotes = stationVotes.filter(v => v.vote === 'downvote').length;
                const userVote = stationVotes.find(v => v.userId === user.email)?.vote;
                
                const stationComments = comments.filter(c => c.stationId === s.id);
                const goodCount = stationComments.filter(c => c.type === 'good').length;
                const badCount = stationComments.filter(c => c.type === 'bad').length;

                const prices = Storage.get('fuelPrices');

                return `
                    <div class="glass-card overflow-hidden flex flex-col animate-fade-in" style="animation-delay: ${idx * 0.05}s">
                        <div class="relative">
                            <img src="${s.image || 'https://images.unsplash.com/photo-1545147986-a9d6f210df77?w=400'}" class="w-full h-48 object-cover opacity-80">
                            <div class="absolute top-4 right-4">
                                <span class="px-3 py-1 rounded-full text-[10px] font-black uppercase tracking-widest ${s.availability ? 'bg-emerald-500/20 text-emerald-400 border border-emerald-500/30' : 'bg-rose-500/20 text-rose-400 border border-rose-500/30'}">
                                    ${s.availability ? 'Available' : 'No Stock'}
                                </span>
                            </div>
                        </div>
                        <div class="p-6 flex-grow">
                            <div class="flex justify-between items-start mb-4">
                                <div>
                                    <h3 class="text-xl font-bold text-slate-100">${s.name}</h3>
                                    <p class="text-sm text-slate-500 font-medium">${s.location}</p>
                                </div>
                                <a href="${s.mapLink || 'https://www.google.com/maps'}" target="_blank" class="p-2 bg-indigo-500/10 text-indigo-400 rounded-lg hover:bg-indigo-500 hover:text-white border border-indigo-500/20">
                                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M5.05 4.05a7 7 0 119.9 9.9L10 18.9l-4.95-4.95a7 7 0 010-9.9zM10 11a2 2 0 100-4 2 2 0 000 4z" clip-rule="evenodd" /></svg>
                                </a>
                            </div>
                            
                            <div class="mb-6 space-y-3">
                                ${s.fuelTypes.map(ft => `
                                    <div class="flex justify-between items-center bg-slate-900/40 p-3 rounded-xl border border-slate-700/30">
                                        <span class="capitalize text-slate-400 font-bold text-xs tracking-wider">${ft}</span>
                                        <div class="text-right">
                                            <div class="font-black text-indigo-400">${s.stock?.[ft] || 0} L</div>
                                            <div class="text-[10px] text-slate-500">Rs.${(prices[ft] || 0).toFixed(2)} / L</div>
                                        </div>
                                    </div>
                                `).join('')}
                            </div>

                            <div class="flex justify-between items-center text-[10px] text-slate-500 mb-6 px-1">
                                <span>Updated: ${new Date(s.lastUpdated).toLocaleTimeString()}</span>
                                <div class="flex space-x-3">
                                    <span class="text-emerald-500 font-bold uppercase tracking-tighter">Good: ${goodCount}</span>
                                    <span class="text-rose-500 font-bold uppercase tracking-tighter">Bad: ${badCount}</span>
                                </div>
                            </div>
                            
                            <div class="flex justify-between items-center mb-6 border-t border-slate-700/50 pt-4">
                                <div class="flex space-x-2">
                                    <button onclick="vote('${s.id}', 'upvote')" class="flex items-center space-x-1.5 px-3 py-1.5 rounded-lg border ${userVote === 'upvote' ? 'bg-emerald-500 text-white border-emerald-600' : 'bg-slate-800/50 text-slate-400 border-slate-700/50'} text-xs font-bold">
                                        <span>👍</span> <span>${upvotes}</span>
                                    </button>
                                    <button onclick="vote('${s.id}', 'downvote')" class="flex items-center space-x-1.5 px-3 py-1.5 rounded-lg border ${userVote === 'downvote' ? 'bg-rose-500 text-white border-rose-600' : 'bg-slate-800/50 text-slate-400 border-slate-700/50'} text-xs font-bold">
                                        <span>👎</span> <span>${downvotes}</span>
                                    </button>
                                </div>
                                ${user.role === 'user' ? `<button onclick="openCommentModal('${s.id}')" class="text-xs font-black text-indigo-400 uppercase tracking-widest hover:text-white">Review</button>` : ''}
                            </div>

                            <div class="max-h-32 overflow-y-auto mb-6 space-y-3 bg-slate-900/20 p-3 rounded-xl border border-slate-800/50">
                                ${stationComments.length > 0 ? stationComments.map(c => `
                                    <div class="text-[11px] border-b border-slate-800/50 pb-2 last:border-0 last:pb-0">
                                        <div class="flex justify-between items-center mb-1">
                                            <span class="font-bold ${c.type === 'good' ? 'text-emerald-400' : 'text-rose-400'}">${c.userName}</span>
                                            <span class="text-slate-600 scale-90">${new Date(c.timestamp).toLocaleDateString()}</span>
                                        </div>
                                        <p class="text-slate-400 italic leading-relaxed">"${c.text}"</p>
                                    </div>
                                `).join('') : '<p class="text-slate-600 text-center text-[10px] py-2 uppercase tracking-widest">No reviews yet</p>'}
                            </div>
                            
                            <div class="space-y-3">
                                ${user.role === 'user' ? `
                                    <button onclick="requestTokenForStation('${s.id}')" class="w-full btn-glow py-3.5 text-sm">REQUEST TOKEN</button>
                                ` : ''}
                                ${user.role === 'staff' || user.role === 'admin' ? `
                                    <div class="grid grid-cols-2 gap-2 mt-2">
                                        <button onclick="openEditStationModal('${s.id}')" class="bg-indigo-600/20 text-indigo-400 border border-indigo-500/30 py-2 rounded-lg text-[10px] uppercase font-bold hover:bg-indigo-600 hover:text-white">Edit Info</button>
                                        <button onclick="openLogFuelModal('${s.id}')" class="btn-secondary-glow py-2 text-[10px] uppercase font-bold">Log Liter</button>
                                        <button onclick="toggleAvailability('${s.id}')" class="bg-slate-700 text-white py-2 rounded-lg text-[10px] uppercase font-bold hover:bg-slate-600">Toggle Status</button>
                                        <button onclick="deleteStation('${s.id}')" class="bg-rose-600/20 text-rose-400 border border-rose-500/30 py-2 rounded-lg text-[10px] uppercase font-bold hover:bg-rose-600 hover:text-white">Delete Station</button>
                                    </div>
                                ` : ''}
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function toggleEditStationModal() {
            document.getElementById('editStationModal').classList.toggle('hidden');
        }

        function openEditStationModal(stationId) {
            const stations = Storage.get('stations');
            const station = stations.find(s => s.id === stationId);
            if (!station) return;

            document.getElementById('editStationId').value = stationId;
            document.getElementById('editName').value = station.name;
            document.getElementById('editLocation').value = station.location;
            document.getElementById('editMapLink').value = station.mapLink || '';
            document.getElementById('editImage').value = station.image || '';
            
            toggleEditStationModal();
        }

        document.getElementById('editStationForm')?.addEventListener('submit', (e) => {
            e.preventDefault();
            const stationId = document.getElementById('editStationId').value;
            const stations = Storage.get('stations');
            const index = stations.findIndex(s => s.id === stationId);

            if (index !== -1) {
                stations[index].name = document.getElementById('editName').value;
                stations[index].location = document.getElementById('editLocation').value;
                stations[index].mapLink = document.getElementById('editMapLink').value;
                stations[index].image = document.getElementById('editImage').value;
                stations[index].lastUpdated = new Date().toISOString();

                Storage.set('stations', stations);
                toggleEditStationModal();
                renderStations();
            }
        });

        function deleteStation(stationId) {
            if (confirm('Are you sure you want to delete this station?')) {
                const stations = Storage.get('stations');
                const filteredStations = stations.filter(s => s.id !== stationId);
                Storage.set('stations', filteredStations);
                renderStations();
            }
        }

        function toggleAddStationModal() {
            document.getElementById('addStationModal').classList.toggle('hidden');
        }

        function toggleLogFuelModal() {
            document.getElementById('logFuelModal').classList.toggle('hidden');
        }

        function toggleCommentModal() {
            document.getElementById('commentModal').classList.toggle('hidden');
        }

        function openCommentModal(stationId) {
            document.getElementById('commentStationId').value = stationId;
            toggleCommentModal();
        }

        document.getElementById('commentForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const stationId = document.getElementById('commentStationId').value;
            const text = document.getElementById('commentText').value;
            const type = document.querySelector('input[name="oilType"]:checked').value;
            
            addComment(stationId, user.email, user.name, text, type);
            toggleCommentModal();
            renderStations();
            e.target.reset();
        });

        function openLogFuelModal(stationId) {
            const stations = Storage.get('stations');
            const station = stations.find(s => s.id === stationId);
            if (!station) return;

            document.getElementById('logStationId').value = stationId;
            const select = document.getElementById('logFuelType');
            select.innerHTML = station.fuelTypes.map(ft => `<option value="${ft}">${ft.charAt(0).toUpperCase() + ft.slice(1)}</option>`).join('');
            
            toggleLogFuelModal();
        }

        document.getElementById('logFuelForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const stationId = document.getElementById('logStationId').value;
            const fuelType = document.getElementById('logFuelType').value;
            const amount = parseInt(document.getElementById('logAmount').value);

            const stations = Storage.get('stations');
            const stationIndex = stations.findIndex(s => s.id === stationId);
            
            if (stationIndex !== -1) {
                if (!stations[stationIndex].stock) stations[stationIndex].stock = {};
                stations[stationIndex].stock[fuelType] = (stations[stationIndex].stock[fuelType] || 0) + amount;
                stations[stationIndex].lastUpdated = new Date().toISOString();
                
                if (amount > 0) stations[stationIndex].availability = true;

                Storage.set('stations', stations);
                logFuelChange(stations[stationIndex].name, fuelType, amount, user.name);
                
                toggleLogFuelModal();
                renderStations();
                e.target.reset();
            }
        });

        function vote(stationId, voteType) {
            const votes = Storage.get('votes') || [];
            const existingVoteIndex = votes.findIndex(v => v.stationId === stationId && v.userId === user.email);
            
            if (existingVoteIndex !== -1) {
                if (votes[existingVoteIndex].vote === voteType) {
                    votes.splice(existingVoteIndex, 1);
                } else {
                    votes[existingVoteIndex].vote = voteType;
                }
            } else {
                votes.push({ stationId, userId: user.email, vote: voteType });
            }
            
            Storage.set('votes', votes);
            renderStations();
        }

        function toggleAvailability(stationId) {
            const stations = Storage.get('stations');
            const station = stations.find(s => s.id === stationId);
            if (station) {
                station.availability = !station.availability;
                station.lastUpdated = new Date().toISOString();
                Storage.set('stations', stations);
                logFuelChange(station.name, station.availability ? 'Available' : 'Unavailable', user.name);
                renderStations();
            }
        }

        function requestTokenForStation(stationId) {
            const blockedUsers = Storage.get('blockedUsers') || [];
            if (blockedUsers.includes(user.email)) {
                alert('Your account has been blocked.');
                return;
            }

            const tokens = Storage.get('tokens') || [];
            const userTokens = tokens.filter(t => t.userId === user.email);
            
            if (userTokens.some(t => t.status === 'waiting')) {
                alert('You already have a waiting token.');
                return;
            }

            const lastServedToken = userTokens
                .filter(t => t.status === 'served')
                .sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt))[0];

            if (lastServedToken) {
                const twoHoursAgo = new Date(Date.now() - 2 * 60 * 60 * 1000);
                if (new Date(lastServedToken.createdAt) > twoHoursAgo) {
                    alert('Please wait 2 hours between token requests.');
                    return;
                }
            }

            const stationTokens = tokens.filter(t => t.stationId === stationId);
            const nextNumber = stationTokens.length > 0 ? Math.max(...stationTokens.map(t => t.tokenNumber)) + 1 : 1;

            tokens.push({
                id: Date.now().toString(),
                userId: user.email,
                stationId: stationId,
                tokenNumber: nextNumber,
                status: 'waiting',
                createdAt: new Date().toISOString()
            });

            Storage.set('tokens', tokens);
            alert(`Token #${nextNumber} generated!`);
            window.location.href = 'token.html';
        }

        document.getElementById('addStationForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const stations = Storage.get('stations');
            const newStation = {
                id: Date.now().toString(),
                name: document.getElementById('stationName').value,
                location: document.getElementById('stationLocation').value,
                fuelTypes: document.getElementById('stationFuelTypes').value.split(',').map(s => s.trim()),
                image: document.getElementById('stationImage').value || 'https://images.unsplash.com/photo-1545147986-a9d6f210df77?w=400',
                availability: true,
                lastUpdated: new Date().toISOString(),
                stock: {}
            };
            newStation.fuelTypes.forEach(ft => newStation.stock[ft] = 0);
            stations.push(newStation);
            Storage.set('stations', stations);
            toggleAddStationModal();
            renderStations();
            e.target.reset();
        });

        searchInput.addEventListener('input', renderStations);
        filterSelect.addEventListener('change', renderStations);

        document.addEventListener('DOMContentLoaded', () => {
            if (user.role === 'staff' || user.role === 'admin') {
                document.getElementById('staffActions').classList.remove('hidden');
                document.getElementById('staffPriceActions').classList.remove('hidden');
                
                const prices = Storage.get('fuelPrices');
                if (document.getElementById('petrolPrice')) document.getElementById('petrolPrice').value = prices.petrol || 0;
                if (document.getElementById('dieselPrice')) document.getElementById('dieselPrice').value = prices.diesel || 0;
            }
            renderStations();
        });

        document.getElementById('priceForm')?.addEventListener('submit', (e) => {
            e.preventDefault();
            updateFuelPrice('petrol', document.getElementById('petrolPrice').value);
            updateFuelPrice('diesel', document.getElementById('dieselPrice').value);
            alert('Prices updated successfully!');
            renderStations();
        });
    </script>
</body>
</html>
