<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stations - Fuel Crisis Management System</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen">
    <nav id="navbar" class="bg-blue-600 text-white shadow-lg"></nav>

    <main class="container mx-auto px-4 py-8">
        <div class="flex flex-col md:flex-row justify-between items-center mb-6">
            <h1 class="text-3xl font-bold">Fuel Stations</h1>
            <div id="staffActions" class="hidden mt-4 md:mt-0">
                <button onclick="toggleAddStationModal()" class="bg-green-600 text-white px-4 py-2 rounded hover:bg-green-700">Add New Station</button>
            </div>
        </div>

        <!-- Search and Filter -->
        <div class="bg-white p-4 rounded-lg shadow-md mb-6 flex flex-col md:flex-row gap-4 items-center">
            <div class="flex-grow w-full">
                <input type="text" id="searchInput" placeholder="Search stations or locations..." class="w-full p-2 border border-gray-300 rounded focus:ring-blue-500">
            </div>
            <select id="filterSelect" class="p-2 border border-gray-300 rounded focus:ring-blue-500 w-full md:w-auto">
                <option value="all">All Stations</option>
                <option value="available">Available Only</option>
                <option value="unavailable">Unavailable Only</option>
            </select>
        </div>

        <div id="staffPriceActions" class="hidden bg-white p-4 rounded-lg shadow-md mb-6">
            <h2 class="text-lg font-bold mb-4 text-blue-600">Update Market Fuel Prices</h2>
            <form id="priceForm" class="flex flex-wrap gap-4">
                <div class="flex items-center space-x-2">
                    <label class="text-sm font-medium">Petrol (Rs):</label>
                    <input type="number" id="petrolPrice" step="0.01" class="p-2 border rounded w-24">
                </div>
                <div class="flex items-center space-x-2">
                    <label class="text-sm font-medium">Diesel (Rs):</label>
                    <input type="number" id="dieselPrice" step="0.01" class="p-2 border rounded w-24">
                </div>
                <button type="submit" class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700 font-bold">Update Prices</button>
            </form>
        </div>

        <!-- Stations List -->
        <div id="stationsList" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <!-- Stations will be rendered here -->
        </div>
    </main>

    <!-- Add Station Modal -->
    <div id="addStationModal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
        <div class="bg-white p-8 rounded-lg shadow-xl w-full max-w-md">
            <h2 class="text-2xl font-bold mb-4 text-blue-600">Add New Station</h2>
            <form id="addStationForm" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium">Station Name</label>
                    <input type="text" id="stationName" required class="w-full p-2 border rounded">
                </div>
                <div>
                    <label class="block text-sm font-medium">Location Name</label>
                    <input type="text" id="stationLocation" required class="w-full p-2 border rounded">
                </div>
                <div>
                    <label class="block text-sm font-medium">Google Maps URL</label>
                    <input type="url" id="stationMapLink" placeholder="https://goo.gl/maps/..." required class="w-full p-2 border rounded">
                </div>
                <div>
                    <label class="block text-sm font-medium">Fuel Types (comma separated)</label>
                    <input type="text" id="stationFuelTypes" placeholder="petrol, diesel" required class="w-full p-2 border rounded">
                </div>
                <div>
                    <label class="block text-sm font-medium">Image URL (optional)</label>
                    <input type="url" id="stationImage" placeholder="https://example.com/image.jpg" class="w-full p-2 border rounded">
                </div>
                <div class="flex justify-end space-x-2">
                    <button type="button" onclick="toggleAddStationModal()" class="px-4 py-2 text-gray-600 hover:text-gray-800">Cancel</button>
                    <button type="submit" class="px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700">Save Station</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Edit Station Modal -->
    <div id="editStationModal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
        <div class="bg-white p-8 rounded-lg shadow-xl w-full max-w-md">
            <h2 class="text-2xl font-bold mb-4 text-blue-600">Edit Station Info</h2>
            <form id="editStationForm" class="space-y-4">
                <input type="hidden" id="editStationId">
                <div>
                    <label class="block text-sm font-medium">Station Name</label>
                    <input type="text" id="editName" required class="w-full p-2 border rounded">
                </div>
                <div>
                    <label class="block text-sm font-medium">Location Name</label>
                    <input type="text" id="editLocation" required class="w-full p-2 border rounded">
                </div>
                <div>
                    <label class="block text-sm font-medium">Google Maps URL</label>
                    <input type="url" id="editMapLink" required class="w-full p-2 border rounded">
                </div>
                <div>
                    <label class="block text-sm font-medium">Image URL</label>
                    <input type="url" id="editImage" class="w-full p-2 border rounded">
                </div>
                <div class="flex justify-end space-x-2">
                    <button type="button" onclick="toggleEditStationModal()" class="px-4 py-2 text-gray-600 hover:text-gray-800">Cancel</button>
                    <button type="submit" class="px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700">Update Info</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Log Fuel Modal -->
    <div id="logFuelModal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
        <div class="bg-white p-8 rounded-lg shadow-xl w-full max-w-md">
            <h2 class="text-2xl font-bold mb-4 text-green-600">Update Fuel Liter</h2>
            <form id="logFuelForm" class="space-y-4">
                <input type="hidden" id="logStationId">
                <div>
                    <label class="block text-sm font-medium">Select Fuel Type</label>
                    <select id="logFuelType" required class="w-full p-2 border rounded"></select>
                </div>
                <div>
                    <label class="block text-sm font-medium">Amount to Add (Liters)</label>
                    <input type="number" id="logAmount" required min="1" class="w-full p-2 border rounded">
                </div>
                <div class="flex justify-end space-x-2">
                    <button type="button" onclick="toggleLogFuelModal()" class="px-4 py-2 text-gray-600 hover:text-gray-800">Cancel</button>
                    <button type="submit" class="px-4 py-2 bg-green-600 text-white rounded hover:bg-green-700">Update Liter</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Comment Modal -->
    <div id="commentModal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
        <div class="bg-white p-8 rounded-lg shadow-xl w-full max-w-md">
            <h2 class="text-2xl font-bold mb-4 text-blue-600">Review Station</h2>
            <form id="commentForm" class="space-y-4">
                <input type="hidden" id="commentStationId">
                <div>
                    <label class="block text-sm font-medium mb-1">How is the oil quality?</label>
                    <div class="flex space-x-4">
                        <label class="flex items-center space-x-2 cursor-pointer">
                            <input type="radio" name="oilType" value="good" checked class="text-green-600">
                            <span class="text-green-600 font-bold">Good Quality</span>
                        </label>
                        <label class="flex items-center space-x-2 cursor-pointer">
                            <input type="radio" name="oilType" value="bad" class="text-red-600">
                            <span class="text-red-600 font-bold">Bad Quality</span>
                        </label>
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-medium">Message</label>
                    <textarea id="commentText" required class="w-full p-2 border rounded h-24" placeholder="Share your experience..."></textarea>
                </div>
                <div class="flex justify-end space-x-2">
                    <button type="button" onclick="toggleCommentModal()" class="px-4 py-2 text-gray-600 hover:text-gray-800">Cancel</button>
                    <button type="submit" class="px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700">Post Review</button>
                </div>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        const stationsList = document.getElementById('stationsList');
        const searchInput = document.getElementById('searchInput');
        const filterSelect = document.getElementById('filterSelect');
        const user = Storage.getCurrentUser();

        function renderPrices() {
            const prices = Storage.get('fuelPrices');
            const container = document.getElementById('priceDisplay');
            if (!container) return;
            container.innerHTML = Object.keys(prices).map(type => `
                <div class="flex items-center space-x-2">
                    <span class="text-xs uppercase font-bold text-blue-500">${type}:</span>
                    <span class="font-bold text-sm">Rs.${prices[type].toFixed(2)}</span>
                </div>
            `).join('');
        }

        function renderStations() {
            const stations = Storage.get('stations');
            const votes = Storage.get('votes');
            const comments = Storage.get('comments');
            const query = searchInput.value.toLowerCase();
            const filter = filterSelect.value;

            const filteredStations = stations.filter(s => {
                const matchesSearch = s.name.toLowerCase().includes(query) || s.location.toLowerCase().includes(query);
                const matchesFilter = filter === 'all' || 
                                     (filter === 'available' && s.availability) || 
                                     (filter === 'unavailable' && !s.availability);
                return matchesSearch && matchesFilter;
            });

            stationsList.innerHTML = filteredStations.map(s => {
                const stationVotes = votes.filter(v => v.stationId === s.id);
                const upvotes = stationVotes.filter(v => v.vote === 'upvote').length;
                const downvotes = stationVotes.filter(v => v.vote === 'downvote').length;
                const userVote = stationVotes.find(v => v.userId === user.email)?.vote;
                
                const stationComments = comments.filter(c => c.stationId === s.id);
                const goodCount = stationComments.filter(c => c.type === 'good').length;
                const badCount = stationComments.filter(c => c.type === 'bad').length;

                const prices = Storage.get('fuelPrices');

                return `
                    <div class="bg-white rounded-lg shadow-md overflow-hidden flex flex-col">
                        <img src="${s.image || 'https://images.unsplash.com/photo-1545147986-a9d6f210df77?auto=format&fit=crop&q=80&w=400'}" alt="${s.name}" class="w-full h-48 object-cover">
                        <div class="p-4 ${s.availability ? 'bg-green-100' : 'bg-red-100'} flex justify-between items-center">
                            <span class="font-bold text-lg">${s.name}</span>
                            <span class="px-2 py-1 rounded-full text-xs font-bold ${s.availability ? 'bg-green-500 text-white' : 'bg-red-500 text-white'}">
                                ${s.availability ? 'Available' : 'Unavailable'}
                            </span>
                        </div>
                        <div class="p-4 flex-grow">
                            <div class="flex justify-between items-start mb-2">
                                <p class="text-gray-600 font-medium"><i class="fas fa-map-marker-alt"></i> ${s.location}</p>
                                <a href="${s.mapLink || 'https://www.google.com/maps'}" target="_blank" class="bg-blue-100 text-blue-600 px-2 py-1 rounded text-xs font-bold hover:bg-blue-200">
                                    View Map
                                </a>
                            </div>
                            
                            <div class="mb-4 space-y-1">
                                <p class="text-xs text-gray-400 uppercase font-bold tracking-widest">Fuel Stock & Price</p>
                                ${s.fuelTypes.map(ft => `
                                    <div class="flex justify-between items-center text-sm border-b border-gray-50 py-1">
                                        <span class="capitalize font-medium">${ft}:</span>
                                        <div class="flex space-x-3">
                                            <span class="font-bold text-blue-600">${s.stock?.[ft] || 0} L</span>
                                            <span class="text-xs text-gray-500 bg-gray-100 px-1 rounded self-center">Rs.${(prices[ft] || 0).toFixed(2)}</span>
                                        </div>
                                    </div>
                                `).join('')}
                            </div>

                            <div class="flex justify-between items-center text-xs text-gray-400 mb-4">
                                <span>Last updated: ${new Date(s.lastUpdated).toLocaleTimeString()}</span>
                                <div class="flex space-x-2">
                                    <span class="text-green-600 font-bold">Good: ${goodCount}</span>
                                    <span class="text-red-600 font-bold">Bad: ${badCount}</span>
                                </div>
                            </div>
                            
                            <div class="flex justify-between items-center mb-4 border-t pt-4">
                                <div class="flex space-x-2">
                                    <button onclick="vote('${s.id}', 'upvote')" class="flex items-center space-x-1 p-1 px-2 rounded ${userVote === 'upvote' ? 'bg-green-600 text-white' : 'bg-gray-200 hover:bg-green-200'}">
                                        <span>👍</span> <span>${upvotes}</span>
                                    </button>
                                    <button onclick="vote('${s.id}', 'downvote')" class="flex items-center space-x-1 p-1 px-2 rounded ${userVote === 'downvote' ? 'bg-red-600 text-white' : 'bg-gray-200 hover:bg-red-200'}">
                                        <span>👎</span> <span>${downvotes}</span>
                                    </button>
                                </div>
                                ${user.role === 'user' ? `<button onclick="openCommentModal('${s.id}')" class="text-xs font-bold text-blue-600 hover:underline">Write Review</button>` : ''}
                            </div>

                            <div class="max-h-32 overflow-y-auto mb-4 space-y-2 bg-gray-50 p-2 rounded border">
                                ${stationComments.length > 0 ? stationComments.map(c => `
                                    <div class="text-xs border-b pb-1 last:border-0">
                                        <div class="flex justify-between items-center">
                                            <span class="font-bold ${c.type === 'good' ? 'text-green-600' : 'text-red-600'}">${c.userName}</span>
                                            <span class="text-gray-400 scale-75">${new Date(c.timestamp).toLocaleDateString()}</span>
                                        </div>
                                        <p class="text-gray-700 italic">"${c.text}"</p>
                                    </div>
                                `).join('') : '<p class="text-gray-400 text-center text-[10px] py-2 uppercase">No reviews yet</p>'}
                            </div>
                            
                            <div class="space-y-2">
                                ${user.role === 'user' ? `
                                    <button onclick="requestTokenForStation('${s.id}')" class="w-full bg-blue-600 text-white py-2 rounded hover:bg-blue-700 transition font-bold shadow-sm">Request Token</button>
                                ` : ''}
                                ${user.role === 'staff' ? `
                                    <div class="grid grid-cols-2 gap-2 mt-4">
                                        <button onclick="openEditStationModal('${s.id}')" class="bg-blue-500 text-white py-1.5 rounded text-sm hover:bg-blue-600 font-bold">Edit Info</button>
                                        <button onclick="openLogFuelModal('${s.id}')" class="bg-green-600 text-white py-1.5 rounded text-sm hover:bg-green-700 font-bold">Log Liter</button>
                                        <button onclick="toggleAvailability('${s.id}')" class="bg-gray-800 text-white py-1.5 rounded text-sm hover:bg-black font-bold">Toggle Status</button>
                                        <button onclick="deleteStation('${s.id}')" class="bg-red-600 text-white py-1.5 rounded text-sm hover:bg-red-700 font-bold">Delete Station</button>
                                    </div>
                                ` : ''}
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function toggleEditStationModal() {
            document.getElementById('editStationModal').classList.toggle('hidden');
        }

        function openEditStationModal(stationId) {
            const stations = Storage.get('stations');
            const station = stations.find(s => s.id === stationId);
            if (!station) return;

            document.getElementById('editStationId').value = stationId;
            document.getElementById('editName').value = station.name;
            document.getElementById('editLocation').value = station.location;
            document.getElementById('editMapLink').value = station.mapLink || '';
            document.getElementById('editImage').value = station.image || '';
            
            toggleEditStationModal();
        }

        document.getElementById('editStationForm')?.addEventListener('submit', (e) => {
            e.preventDefault();
            const stationId = document.getElementById('editStationId').value;
            const stations = Storage.get('stations');
            const index = stations.findIndex(s => s.id === stationId);

            if (index !== -1) {
                stations[index].name = document.getElementById('editName').value;
                stations[index].location = document.getElementById('editLocation').value;
                stations[index].mapLink = document.getElementById('editMapLink').value;
                stations[index].image = document.getElementById('editImage').value;
                stations[index].lastUpdated = new Date().toISOString();

                Storage.set('stations', stations);
                toggleEditStationModal();
                renderStations();
            }
        });

        function deleteStation(stationId) {
            if (confirm('Are you sure you want to delete this station? All associated tokens and votes will remain but the station will no longer be visible.')) {
                const stations = Storage.get('stations');
                const filteredStations = stations.filter(s => s.id !== stationId);
                Storage.set('stations', filteredStations);
                renderStations();
            }
        }

        function toggleAddStationModal() {
            document.getElementById('addStationModal').classList.toggle('hidden');
        }

        function toggleLogFuelModal() {
            document.getElementById('logFuelModal').classList.toggle('hidden');
        }

        function toggleCommentModal() {
            document.getElementById('commentModal').classList.toggle('hidden');
        }

        function openCommentModal(stationId) {
            document.getElementById('commentStationId').value = stationId;
            toggleCommentModal();
        }

        document.getElementById('commentForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const stationId = document.getElementById('commentStationId').value;
            const text = document.getElementById('commentText').value;
            const type = document.querySelector('input[name="oilType"]:checked').value;
            
            addComment(stationId, user.email, user.name, text, type);
            toggleCommentModal();
            renderStations();
            e.target.reset();
        });

        function openLogFuelModal(stationId) {
            const stations = Storage.get('stations');
            const station = stations.find(s => s.id === stationId);
            if (!station) return;

            document.getElementById('logStationId').value = stationId;
            const select = document.getElementById('logFuelType');
            select.innerHTML = station.fuelTypes.map(ft => `<option value="${ft}">${ft.charAt(0).toUpperCase() + ft.slice(1)}</option>`).join('');
            
            toggleLogFuelModal();
        }

        document.getElementById('logFuelForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const stationId = document.getElementById('logStationId').value;
            const fuelType = document.getElementById('logFuelType').value;
            const amount = parseInt(document.getElementById('logAmount').value);

            const stations = Storage.get('stations');
            const stationIndex = stations.findIndex(s => s.id === stationId);
            
            if (stationIndex !== -1) {
                if (!stations[stationIndex].stock) stations[stationIndex].stock = {};
                stations[stationIndex].stock[fuelType] = (stations[stationIndex].stock[fuelType] || 0) + amount;
                stations[stationIndex].lastUpdated = new Date().toISOString();
                
                // Auto-set available if adding fuel
                if (amount > 0) stations[stationIndex].availability = true;

                Storage.set('stations', stations);
                logFuelChange(stations[stationIndex].name, fuelType, amount, user.name);
                
                toggleLogFuelModal();
                renderStations();
                e.target.reset();
            }
        });

        function vote(stationId, voteType) {
            const votes = Storage.get('votes');
            const existingVoteIndex = votes.findIndex(v => v.stationId === stationId && v.userId === user.email);
            
            if (existingVoteIndex !== -1) {
                if (votes[existingVoteIndex].vote === voteType) {
                    votes.splice(existingVoteIndex, 1); // Remove vote if clicked same
                } else {
                    votes[existingVoteIndex].vote = voteType; // Change vote
                }
            } else {
                votes.push({ stationId, userId: user.email, vote: voteType });
            }
            
            Storage.set('votes', votes);
            renderStations();
        }

        function toggleAvailability(stationId) {
            const stations = Storage.get('stations');
            const station = stations.find(s => s.id === stationId);
            if (station) {
                station.availability = !station.availability;
                station.lastUpdated = new Date().toISOString();
                Storage.set('stations', stations);
                
                // Log the change
                logFuelChange(station.name, station.availability ? 'Available' : 'Unavailable', user.name);
                
                renderStations();
            }
        }

        function requestTokenForStation(stationId) {
            // Check manual block
            const blockedUsers = Storage.get('blockedUsers');
            if (blockedUsers.includes(user.email)) {
                alert('Your account has been blocked from requesting tokens by staff.');
                return;
            }

            // Check restrictions
            const tokens = Storage.get('tokens');
            const userTokens = tokens.filter(t => t.userId === user.email);
            
            if (userTokens.some(t => t.status === 'waiting')) {
                alert('You already have a waiting token.');
                return;
            }

            const lastServedToken = userTokens
                .filter(t => t.status === 'served')
                .sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt))[0];

            if (lastServedToken) {
                const twoHoursAgo = new Date(Date.now() - 2 * 60 * 60 * 1000);
                if (new Date(lastServedToken.createdAt) > twoHoursAgo) {
                    alert('Please wait 2 hours between token requests.');
                    return;
                }
            }

            // Generate token
            const stationTokens = tokens.filter(t => t.stationId === stationId);
            const nextNumber = stationTokens.length > 0 ? Math.max(...stationTokens.map(t => t.tokenNumber)) + 1 : 1;

            const newToken = {
                id: Date.now().toString(),
                userId: user.email,
                stationId: stationId,
                tokenNumber: nextNumber,
                status: 'waiting',
                createdAt: new Date().toISOString()
            };

            tokens.push(newToken);
            Storage.set('tokens', tokens);
            alert(`Token #${nextNumber} generated successfully!`);
            window.location.href = 'token.html';
        }

        document.getElementById('addStationForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const stations = Storage.get('stations');
            const newStation = {
                id: Date.now().toString(),
                name: document.getElementById('stationName').value,
                location: document.getElementById('stationLocation').value,
                fuelTypes: document.getElementById('stationFuelTypes').value.split(',').map(s => s.trim()),
                image: document.getElementById('stationImage').value || 'https://images.unsplash.com/photo-1545147986-a9d6f210df77?auto=format&fit=crop&q=80&w=400',
                availability: true,
                lastUpdated: new Date().toISOString(),
                stock: {}
            };
            newStation.fuelTypes.forEach(ft => newStation.stock[ft] = 0);
            stations.push(newStation);
            Storage.set('stations', stations);
            toggleAddStationModal();
            renderStations();
            e.target.reset();
        });

        searchInput.addEventListener('input', renderStations);
        filterSelect.addEventListener('change', renderStations);

        document.addEventListener('DOMContentLoaded', () => {
            if (user.role === 'staff' || user.role === 'admin') {
                document.getElementById('staffActions').classList.remove('hidden');
                document.getElementById('staffPriceActions').classList.remove('hidden');
                
                const prices = Storage.get('fuelPrices');
                if (document.getElementById('petrolPrice')) document.getElementById('petrolPrice').value = prices.petrol || 0;
                if (document.getElementById('dieselPrice')) document.getElementById('dieselPrice').value = prices.diesel || 0;
            }
            renderStations();
        });

        document.getElementById('priceForm')?.addEventListener('submit', (e) => {
            e.preventDefault();
            const petrol = document.getElementById('petrolPrice').value;
            const diesel = document.getElementById('dieselPrice').value;
            
            updateFuelPrice('petrol', petrol);
            updateFuelPrice('diesel', diesel);
            
            alert('Prices updated successfully!');
            renderStations();
        });
    </script>
</body>
</html>
